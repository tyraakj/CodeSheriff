spring.datasource.url=jdbc:h2:mem:codesheriff;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;DEFAULT_NULL_ORDERING=HIGH
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.driver-class-name=org.h2.Driver
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false
spring.jpa.open-in-view=false
spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.security.servlet.UserDetailsServiceAutoConfiguration
logging.level.org.hibernate.dialect=ERROR
logging.level.org.hibernate.orm.deprecation=ERROR

ibm.api.key=test
ibm.api.url=http://localhost
ibm.project.id=test
supabase.jwt.secret=test-secret
